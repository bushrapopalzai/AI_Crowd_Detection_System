app:
  title: "AI Detection System v2.0"
  version: "2.0.0"
  theme: "dark"

detection:
  model: "yolov8s"  # yolov8n, yolov8s, yolov8m
  confidence_threshold: 0.5
  iou_threshold: 0.45
  device: "auto"  # auto, cpu, cuda, mps

database:
  type: "sqlite"  # sqlite, postgresql
  path: "detection_records.db"
  backup_enabled: true
  backup_interval: 3600  # seconds

performance:
  max_fps: 30
  buffer_size: 5
  adaptive_skip: true
  batch_size: 1
  num_workers: 2

ui:
  window_width: 1600
  window_height: 1000
  use_customtkinter: true
  chart_update_interval: 1000  # ms

logging:
  level: "INFO"
  file: "detection.log"
  max_size: 10485760  # 10MB
